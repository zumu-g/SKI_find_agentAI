name: Refresh Agent Data

on:
  schedule:
    - cron: '0 2 * * 1'   # Every Monday at 2am UTC (12pm AEDT)
  workflow_dispatch:       # Allow manual runs from GitHub Actions UI

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run agent sync
        run: npx tsx scripts/sync-agents-from-apify.ts
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          APIFY_ACTOR_ID: easyapi/domain-com-au-real-estate-agents-scraper
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
